<style>
*{box-sizing:border-box;margin:0;padding:0}

.logo{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid #e5e7eb;border-radius:999px;padding:6px 16px;margin-bottom:20px}
.logo-text{font-weight:600;font-size:14px;color:#111827}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);overflow:hidden;width:100%;max-width:520px}
.pbar{height:3px;background:#f3f4f6}
.pfill{height:100%;background:#6366f1;transition:width .4s}
.body{padding:24px}
.tnav{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.bbtn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:999px;font-size:12px;border:1px solid #e5e7eb;background:#fff;color:#6b7280;cursor:pointer}
.bbtn:hover{background:#f9fafb}
.hbadge{padding:4px 12px;border-radius:999px;font-size:12px;background:#eef2ff;color:#4f46e5;font-weight:600;border:1px solid #c7d2fe}
.qtitle{font-size:18px;font-weight:700;color:#111827;margin-bottom:4px;line-height:1.4}
.qsub{font-size:13px;color:#6b7280;margin-bottom:18px;line-height:1.5}
.citem{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1.5px solid #e5e7eb;cursor:pointer;margin-bottom:8px;transition:all .15s}
.citem:hover{border-color:#c7d2fe}
.citem.sel{border-color:#6366f1;background:#eef2ff}
.cion{width:36px;height:36px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.citem.sel .cion{background:#e0e7ff}
.cname{font-weight:600;font-size:14px;color:#111827}
.citem.sel .cname{color:#4f46e5}
.cdesc{font-size:12px;color:#9ca3af;margin-top:2px}
.chk{width:20px;height:20px;border-radius:50%;background:#6366f1;display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;opacity:0;transition:opacity .15s;color:#fff;font-size:11px;font-weight:700}
.citem.sel .chk{opacity:1}
/* 난이도 선택 카드 */
.lv-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.lvbtn{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:12px;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;transition:all .15s;text-align:left}
.lvbtn:hover{border-color:#c7d2fe}
.lvbtn.sel-g{border-color:#22c55e;background:#f0fdf4}
.lvbtn.sel-b{border-color:#6366f1;background:#eef2ff}
.lvbtn.sel-a{border-color:#f97316;background:#fff7ed}
.lv-emoji{font-size:22px;flex-shrink:0}
.lv-name{font-weight:700;font-size:14px;color:#111827}
.lv-desc{font-size:12px;color:#6b7280;margin-top:2px}
.lvbtn.sel-g .lv-name{color:#16a34a}
.lvbtn.sel-b .lv-name{color:#4f46e5}
.lvbtn.sel-a .lv-name{color:#ea580c}
.lv-req{font-size:12px;color:#ef4444;margin-bottom:12px;display:none}
.lv-req.show{display:block}
/* 주제 칩 */
.chips{display:flex;flex-wrap:wrap;gap:7px;max-height:290px;overflow-y:auto;padding-right:2px;margin-bottom:18px}
.chip{padding:6px 12px;border-radius:999px;font-size:13px;border:1.5px solid #e5e7eb;background:#fff;color:#374151;cursor:pointer;transition:all .15s;line-height:1.4}
.chip:hover{border-color:#c7d2fe}
.chip.sel{border-color:#6366f1;background:#eef2ff;color:#4f46e5;font-weight:600}
/* 학교급 */
.gitem{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:12px;border:1.5px solid #e5e7eb;cursor:pointer;margin-bottom:8px;font-size:14px;color:#374151;transition:all .15s}
.gitem:hover{border-color:#c7d2fe}
.gitem.sel{border-color:#6366f1;background:#eef2ff;color:#4f46e5;font-weight:600}
/* 버튼 */
.brow{display:flex;gap:8px;margin-top:6px}
.btn{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid #e5e7eb;background:#fff;color:#374151}
.btn:hover{background:#f9fafb}
.btn.p{flex:2;background:#6366f1;border-color:#6366f1;color:#fff}
.btn.p:hover{background:#4f46e5}
.btn:disabled{opacity:.4;cursor:not-allowed}
.err{color:#ef4444;font-size:12px;margin-top:8px}
.dsum{margin-top:16px;padding:12px 14px;background:#f9fafb;border-radius:12px;font-size:12px;color:#6b7280;text-align:left;line-height:1.9}

  coding:{begin:coding_begin,mid:coding_mid,adv:coding_adv},
  art:   {begin:art_begin,mid:art_mid,adv:art_adv},
  lang:  {begin:lang_begin,mid:lang_mid,adv:lang_adv},
  cert:  {begin:cert_begin,mid:cert_mid,adv:cert_adv},
  life:  {all:life_all},
};

const CATS=[
  {key:"coding",icon:"💻",label:"코딩·AI",desc:"코딩, 인공지능, 앱개발"},
  {key:"art",   icon:"🎨",label:"아트·영상·음악",desc:"그림, 영상편집, 악기, 사진"},
  {key:"lang",  icon:"🌍",label:"외국어",desc:"영어, 일본어, 중국어 등"},
  {key:"cert",  icon:"📋",label:"자격증·스펙",desc:"컴활, ITQ, 한국사 등"},
  {key:"life",  icon:"🍳",label:"취미·라이프",desc:"요리, 운동, 공예, 뷰티 등"},
];
const LVS=[
  {key:"begin",emoji:"🟢",name:"입문",desc:"처음 배워요",cls:"sel-g"},
  {key:"mid",  emoji:"🟡",name:"초급·중급",desc:"조금 알아요",cls:"sel-b"},
  {key:"adv",  emoji:"🔴",name:"고급·자격증",desc:"심화에 도전해요",cls:"sel-a"},
];
const GRADES=["중학교 1~2학년","중학교 3학년","고등학교 1학년","고등학교 2~3학년","기타"];

const st={step:"category",selCats:[],topicIdx:0,topics:{},school:"",activeLv:{},submitting:false};
function co(k){return CATS.find(c=>c.key===k);}
function pp(){
  if(st.step==="category") return 8;
  if(st.step==="topics") return 15+(st.topicIdx/st.selCats.length)*72;
  if(st.step==="school") return 90;
  return 100;
}
function render(){
  document.getElementById("pf").style.width=pp()+"%";
  const b=document.getElementById("bd");b.innerHTML="";
  if(st.step==="category") rCat(b);
  else if(st.step==="topics") rTopics(b);
  else if(st.step==="school") rSchool(b);
  else rDone(b);
}

function rCat(b){
  b.innerHTML=`<div class="qtitle">배우고 싶은 분야가 있나요?</div><div class="qsub">여러 개 선택할 수 있어요</div>`+
  CATS.map(c=>`<div class="citem ${st.selCats.includes(c.key)?'sel':''}" onclick="tCat('${c.key}')">
    <div class="cion">${c.icon}</div>
    <div><div class="cname">${c.label}</div><div class="cdesc">${c.desc}</div></div>
    <div class="chk">✓</div>
  </div>`).join("")+
  `<div class="brow"><button class="btn p" onclick="next()" ${st.selCats.length===0?'disabled':''}>다음 →</button></div>`;
}

function rTopics(b){
  const key=st.selCats[st.topicIdx];
  const cat=co(key);
  const isLife=key==="life";
  const curLv=st.activeLv[key]||"";
  const topics=isLife?T.life.all:(curLv?T[key][curLv]:[]);
  const sel=st.topics[key]||[];

  // 난이도 버튼
  const lvHtml=isLife?"":LVS.map(l=>`
    <button class="lvbtn ${curLv===l.key?l.cls:''}" onclick="sLv('${key}','${l.key}')">
      <span class="lv-emoji">${l.emoji}</span>
      <div><div class="lv-name">${l.name}</div><div class="lv-desc">${l.desc}</div></div>
      ${curLv===l.key?'<span style="margin-left:auto;font-weight:700;font-size:16px">✓</span>':''}
    </button>`).join("");

  // 주제 칩
  const guideHtml=topics.length>0?`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div style="font-size:13px;font-weight:600;color:#4f46e5">💡 관심 있는 강좌를 선택해주세요!</div>
    <div style="font-size:12px;color:${sel.length>0?'#16a34a':'#9ca3af'};font-weight:${sel.length>0?'600':'400'}">${sel.length>0?sel.length+'개 선택됨':'0개 선택됨'}</div>
  </div>`:"";
  const chipsHtml=topics.length>0?`${guideHtml}<div class="chips" style="border:1.5px solid ${sel.length>0?'#c7d2fe':'#e5e7eb'};border-radius:12px;padding:12px;background:${sel.length>0?'#fafafe':'#fafafa'}">${topics.map(t=>`
    <div class="chip ${sel.includes(t)?'sel':''}" onclick="tTopic('${key}','${t.replace(/'/g,"&#39;")}')">${sel.includes(t)?'✓ ':''}${t}</div>`).join("")}</div>`
    :(isLife?"":`<div style="text-align:center;padding:20px;color:#9ca3af;font-size:13px">← 먼저 난이도를 선택해주세요</div>`);

  b.innerHTML=`
    <div class="tnav">
      <button class="bbtn" onclick="back()">← ${st.topicIdx===0?"분야 선택으로":"이전 분야"}</button>
      <span class="hbadge">${cat.icon} ${cat.label} · ${st.topicIdx+1}/${st.selCats.length}</span>
    </div>
    <div class="qtitle">관심 있는 주제를 골라주세요</div>
    <div class="qsub">${isLife?"취미·라이프 전체 목록 · 여러 개 선택 가능":"난이도를 먼저 선택하면 맞는 강의를 보여드려요"}</div>
    ${isLife?"":`<div id="lv-req" class="lv-req">⚠ 난이도를 먼저 선택해주세요!</div><div class="lv-wrap">${lvHtml}</div>`}
    ${chipsHtml}
    <div id="topic-req" class="lv-req">⚠ 강좌를 1개 이상 선택해주세요!</div>
    <div class="brow">
      <button class="btn p" onclick="goNextTopic()">${st.topicIdx<st.selCats.length-1?"다음 분야 →":"다음 →"}</button>
    </div>`;
}

function rSchool(b){
  b.innerHTML=`
    <div class="tnav"><button class="bbtn" onclick="back()">← 주제 선택으로</button></div>
    <div class="qtitle">마지막 질문이에요 🎉</div>
    <div class="qsub">현재 학교급을 알려주세요</div>`+
  GRADES.map(g=>`<div class="gitem ${st.school===g?'sel':''}" onclick="sGrade('${g}')">${g}${st.school===g?' ✓':''}</div>`).join("")+
  `<div id="err" class="err"></div>
  <div class="brow"><button class="btn p" id="sb" onclick="submit()" ${st.submitting?'disabled':''}>
    ${st.submitting?'제출 중...':'✨ 설문 제출하기'}
  </button></div>`;
}

function rDone(b){
  const catL=st.selCats.map(k=>co(k).icon+" "+co(k).label).join(", ");
  const tLines=Object.entries(st.topics).filter(([,v])=>v.length>0)
    .map(([k,v])=>`<b>${co(k).icon} ${co(k).label}</b><br>${v.join(", ")}`).join("<br>");
  const lvLines=Object.entries(st.activeLv).filter(([k])=>k!=="life")
    .map(([k,lv])=>`${co(k).label}: ${LVS.find(l=>l.key===lv)?.name||lv}`).join(", ");
  b.innerHTML=`<div style="text-align:center;padding:24px 0">
    <div style="font-size:52px;margin-bottom:16px">🎉</div>
    <div style="font-size:20px;font-weight:700;color:#111827;margin-bottom:8px">참여해주셔서 감사해요!</div>
    <div style="font-size:13px;color:#6b7280;line-height:1.7">여러분의 선택이 경기온라인학교<br>강의 개설에 직접 반영됩니다.</div>
    <div class="dsum">
      <b>선택 분야</b><br>${catL}
      ${lvLines?`<br><b>수준</b><br>${lvLines}`:""}
      ${tLines?`<br><br>${tLines}`:""}
      ${st.school?`<br><br><b>학교급</b><br>${st.school}`:""}
    </div>
  </div>`;
}

function tCat(k){const i=st.selCats.indexOf(k);if(i>-1)st.selCats.splice(i,1);else st.selCats.push(k);render();}
function tTopic(k,t){if(!st.topics[k])st.topics[k]=[];const i=st.topics[k].indexOf(t);if(i>-1)st.topics[k].splice(i,1);else st.topics[k].push(t);render();}
function sLv(k,lv){st.activeLv[k]=lv;render();}
function sGrade(g){st.school=st.school===g?"":g;render();}

function next(){
  if(st.step==="category"){if(st.selCats.length===0)return;st.topicIdx=0;st.step="topics";}
  render();
}

function goNextTopic(){
  const key=st.selCats[st.topicIdx];
  const isLife=key==="life";
  // 취미 아닌데 난이도 선택 안 했으면 경고
  if(!isLife && !st.activeLv[key]){
    const el=document.getElementById("lv-req");
    if(el)el.classList.add("show");
    return;
  }
  // 강좌 1개 이상 선택 필수
  const sel=st.topics[key]||[];
  if(sel.length===0){
    const el=document.getElementById("topic-req");
    if(el)el.classList.add("show");
    return;
  }
  if(st.topicIdx<st.selCats.length-1) st.topicIdx++;
  else st.step="school";
  render();
}

function back(){
  if(st.step==="topics"){if(st.topicIdx===0)st.step="category";else st.topicIdx--;}
  else if(st.step==="school"){st.topicIdx=st.selCats.length-1;st.step="topics";}
  render();
}

async function submit(){
  st.submitting=true;render();
  const lvSum=Object.entries(st.activeLv).map(([k,lv])=>`[${co(k).label}] ${LVS.find(l=>l.key===lv)?.name||lv}`).join(", ");
  const payload={
    timestamp:new Date().toLocaleString("ko-KR"),
    categories:st.selCats.map(k=>co(k).label).join(", "),
    topics:Object.entries(st.topics).map(([k,v])=>`[${co(k).label}] ${v.join(" / ")}`).join("\n"),
    level:lvSum||"취미만선택",
    school:st.school||"미응답",
  };
  try{
    await fetch(URL_,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    st.step="done";
  }catch(e){
    st.submitting=false;render();
    const el=document.getElementById("err");if(el)el.textContent="제출 중 오류가 발생했습니다. 다시 시도해주세요.";return;
  }
  render();
}

render();
</script>
</body>
</html>
