<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경기온라인학교 콘텐츠 수요 설문</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f3f4f6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
.logo{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid #e5e7eb;border-radius:999px;padding:6px 16px;margin-bottom:24px}
.logo-text{font-weight:600;font-size:14px;color:#111827}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);width:100%;max-width:480px;padding:48px 32px;text-align:center}
.icon{font-size:56px;margin-bottom:20px}
.title{font-size:22px;font-weight:700;color:#111827;margin-bottom:12px;line-height:1.4}
.desc{font-size:14px;color:#6b7280;line-height:1.8}
.divider{border:none;border-top:1px solid #f3f4f6;margin:24px 0}
.thanks{font-size:13px;color:#9ca3af}
</style>
</head>
<body>
<div class="logo"><span style="font-size:16px">🎓</span><span class="logo-text">경기온라인학교</span></div>
<div class="card">
  <div class="icon">📋</div>
  <div class="title">설문이 종료되었습니다</div>
  <div class="desc">
    콘텐츠 강의 선호도 조사에<br>참여해주셔서 감사합니다.<br><br>
    응답해주신 내용을 바탕으로<br>더 좋은 강의를 준비하겠습니다.
  </div>
  <div class="divider"></div>
  <div class="thanks">경기온라인학교 드림 🙏</div>
</div>
</body>
</html>
