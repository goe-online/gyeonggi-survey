}
function rTopics(b){
  const key=st.selCats[st.topicIdx];const cat=co(key);const isLife=key==="life";const lv=st.activeLv[key]||"begin";const topics=gt(key,lv);const sel=st.topics[key]||[];
  b.innerHTML=`<div class="tnav"><button class="bbtn" onclick="back()">← ${st.topicIdx===0?"분야 선택으로":"이전 분야"}</button><span class="sbadge">${cat.icon} ${cat.label} · ${st.topicIdx+1}/${st.selCats.length}</span></div>`+
  `<div class="qtitle">관심 있는 주제를 골라주세요</div><div class="qsub">${isLife?"취미·라이프 전체 목록":"수준 탭을 바꿔서 더 볼 수 있어요"} · 여러 개 선택 가능</div>`+
  (isLife?"":`<div class="tabs">${LVS.map(l=>`<button class="tab ${lv===l.key?'act':''}" onclick="sLv('${key}','${l.key}')">${l.icon} ${l.label}</button>`).join("")}</div>`)+
  `<div class="chips">${topics.map(t=>`<div class="chip ${sel.includes(t)?'sel':''}" onclick="tTopic('${key}','${t.replace(/'/g,"&#39;")}')">${sel.includes(t)?'✓ ':''}${t}</div>`).join("")}</div>`+
  `<div class="brow"><button class="btn p" onclick="next()">${st.topicIdx<st.selCats.length-1?"다음 분야 →":"다음 →"}</button></div>`;
}
function rSchool(b){
  b.innerHTML=`<div class="tnav"><button class="bbtn" onclick="back()">← 주제 선택으로</button></div>`+
  `<div class="qtitle">마지막 질문이에요 🎉</div><div class="qsub">현재 학교급을 알려주세요 <span style="color:#9ca3af">(선택사항)</span></div>`+
  GRADES.map(g=>`<div class="gitem ${st.school===g?'sel':''}" onclick="sGrade('${g}')">${g}${st.school===g?' ✓':''}</div>`).join("")+
  `<div id="err" class="err"></div><div class="brow"><button class="btn p" id="sb" onclick="submit()" ${st.submitting?'disabled':''}>${st.submitting?'제출 중...':'✨ 설문 제출하기'}</button></div>`;
}
function rDone(b){
  const catL=st.selCats.map(k=>co(k).icon+" "+co(k).label).join(", ");
  const tLines=Object.entries(st.topics).filter(([,v])=>v.length>0).map(([k,v])=>`<b>${co(k).icon} ${co(k).label}</b><br>${v.join(", ")}`).join("<br>");
  b.innerHTML=`<div style="text-align:center;padding:24px 0"><div style="font-size:52px;margin-bottom:16px">🎉</div><div style="font-size:20px;font-weight:700;color:#111827;margin-bottom:8px">참여해주셔서 감사해요!</div><div style="font-size:13px;color:#6b7280;line-height:1.7">여러분의 선택이 경기온라인학교<br>강의 개설에 직접 반영됩니다.</div><div class="dsum"><b>선택 분야</b><br>${catL}${tLines?`<br><br>${tLines}`:""}${st.school?`<br><br><b>학교급</b><br>${st.school}`:""}</div></div>`;
}
function tCat(k){const i=st.selCats.indexOf(k);if(i>-1)st.selCats.splice(i,1);else st.selCats.push(k);render();}
function tTopic(k,t){if(!st.topics[k])st.topics[k]=[];const i=st.topics[k].indexOf(t);if(i>-1)st.topics[k].splice(i,1);else st.topics[k].push(t);render();}
function sLv(k,lv){st.activeLv[k]=lv;render();}
function sGrade(g){st.school=st.school===g?"":g;render();}
function next(){
  if(st.step==="category"){if(st.selCats.length===0)return;st.topicIdx=0;st.step="topics";}
  else if(st.step==="topics"){if(st.topicIdx<st.selCats.length-1)st.topicIdx++;else st.step="school";}
  render();
}
function back(){
  if(st.step==="topics"){if(st.topicIdx===0)st.step="category";else st.topicIdx--;}
  else if(st.step==="school"){st.topicIdx=st.selCats.length-1;st.step="topics";}
  render();
}
async function submit(){
  st.submitting=true;render();
  const lvSum=Object.entries(st.activeLv).map(([k,lv])=>`[${co(k).label}] ${LVS.find(l=>l.key===lv)?.label||lv}`).join(", ");
  const payload={timestamp:new Date().toLocaleString("ko-KR"),categories:st.selCats.map(k=>co(k).label).join(", "),topics:Object.entries(st.topics).map(([k,v])=>`[${co(k).label}] ${v.join(" / ")}`).join("\n"),level:lvSum||"취미만선택",school:st.school||"미응답"};
  try{
    await fetch(URL_,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    st.step="done";
  }catch(e){
    st.submitting=false;render();
    const el=document.getElementById("err");if(el)el.textContent="제출 중 오류가 발생했습니다. 다시 시도해주세요.";return;
  }
  render();
}
render();
</script>
</body>
</html>
